            "강남구": { total: 7230, history: { "2016이전": 1800, "2017": 310, "2018": 350, "2019": 410, "2020": 460, "2021": 520, "2022": 570, "2023": 780, "2024": 1230, "2025": 800 } },
            "송파구": { total: 3210, history: { "2016이전": 800, "2017": 120, "2018": 140, "2019": 160, "2020": 190, "2021": 220, "2022": 250, "2023": 350, "2024": 630, "2025": 350 } },
            "강동구": { total: 3190, history: { "2016이전": 780, "2017": 120, "2018": 140, "2019": 160, "2020": 190, "2021": 220, "2022": 250, "2023": 350, "2024": 630, "2025": 350 } }
        };

        // --- CSV 문자열 파싱 헬퍼 함수 ---
        const parseCSV = (text) => {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result;
            }).filter(row => row.length > 0 && row[0] !== '');
        };

        function App() {
            // 상태값 관리
            const [popData, setPopData] = useState(DEFAULT_POP_DATA);
            const [cctvData, setCctvData] = useState(DEFAULT_CCTV_DATA);
            const [selectedDistrict, setSelectedDistrict] = useState("종로구");
            const [chartTab, setChartTab] = useState("ratio"); // 'ratio' | 'popPerCctv'
            const [searchTerm, setSearchTerm] = useState("");
            const [sortConfig, setSortConfig] = useState({ key: "cctvRatio", direction: "descending" });
            const [uploadMessage, setUploadMessage] = useState({ text: "기본 내장 2025 데이터가 로드되었습니다. 최신 CSV를 드롭해 교체할 수 있습니다.", type: "info" });

            // CSV 파일 처리기
            const handleFileUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const text = event.target.result;
                        const parsed = parseCSV(text);
                        
                        if (parsed.length < 2) {
                            throw new Error("유효한 행 데이터가 부족합니다.");
                        }

                        // 헤더나 파일 구조 분석을 통한 파일 유형 자동 판별
                        const headerLine = parsed[0].join(',');
                        
                        if (headerLine.includes("서울특별시") || headerLine.includes("총인구") || file.name.includes("pop")) {
                            // 인구 데이터 파싱
                            const newPop = {};
                            parsed.forEach((row, idx) => {
                                if (idx === 0) return; // 헤더 제외
                                const name = row[0].replace(/\s+/g, '');
                                if (name === "서울특별시" || name === "합계" || name === "계" || !name) return;
                                
                                const total = parseInt((row[1] || "0").replace(/,/g, ''), 10);
                                const korean = parseInt((row[2] || "0").replace(/,/g, ''), 10);
                                const foreign = parseInt((row[3] || "0").replace(/,/g, ''), 10);
                                
                                if (!isNaN(total)) {
                                    newPop[name] = { total, korean, foreign };
                                }
                            });
                            setPopData(newPop);
                            setUploadMessage({ text: "인구 데이터(Seoul_pop_2025.csv)가 정상 업데이트되었습니다!", type: "success" });
                        } else if (headerLine.includes("자치구") || headerLine.includes("총 계") || file.name.includes("CCTV")) {
                            // CCTV 데이터 파싱
                            const newCctv = {};
                            const years = parsed[0].slice(2); // ["2016년 이전", "2017년", ...]
                            
                            parsed.forEach((row, idx) => {
                                if (idx === 0) return; // 헤더 제외
                                const name = row[0].replace(/\s+/g, '');
                                if (name === "자치구" || name === "계" || name === "합계" || !name) return;

                                const total = parseInt((row[1] || "0").replace(/,/g, ''), 10);
                                const history = {};
                                years.forEach((yr, yrIdx) => {
                                    const cleanedYr = yr.replace("년", "").trim();
                                    history[cleanedYr] = parseInt((row[yrIdx + 2] || "0").replace(/,/g, ''), 10);
                                });

                                if (!isNaN(total)) {
                                    newCctv[name] = { total, history };
                                }
                            });
                            setCctvData(newCctv);
                            setUploadMessage({ text: "CCTV 설치 데이터(CCTV.csv)가 정상 업데이트되었습니다!", type: "success" });
                        } else {
                            setUploadMessage({ text: "파일 구조를 감지하지 못했습니다. 올바른 CSV 파일인지 확인하세요.", type: "error" });
                        }
                    } catch (err) {
                        console.error(err);
                        setUploadMessage({ text: `파일 파싱 실패: ${err.message}`, type: "error" });
                    }
                };
                reader.readAsText(file, "EUC-KR"); // 한국어 깨짐 방지용 기본 한글 엔코딩 지원
            };

            // 데이터 취합 및 계산 로직 (Memoized)
            const analysisData = useMemo(() => {
                const combined = [];
                let totalCCTVOverall = 0;
                let totalPopOverall = 0;

                // 공통된 구 이름을 찾아서 결합
                const districtKeys = Object.keys(popData);
                
                districtKeys.forEach(district => {
                    const cleanName = district.replace(/\s+/g, '');
                    const popInfo = popData[district];
                    
                    // CCTV.csv의 키 공백 처리 대응 ("중 구" -> "중구" 등)
                    const cctvKey = Object.keys(cctvData).find(k => k.replace(/\s+/g, '') === cleanName);
                    const cctvInfo = cctvKey ? cctvData[cctvKey] : null;

                    if (popInfo && cctvInfo) {
                        totalCCTVOverall += cctvInfo.total;
                        totalPopOverall += popInfo.total;
                    }
                });

                districtKeys.forEach(district => {
                    const cleanName = district.replace(/\s+/g, '');
                    const popInfo = popData[district];
                    const cctvKey = Object.keys(cctvData).find(k => k.replace(/\s+/g, '') === cleanName);
                    const cctvInfo = cctvKey ? cctvData[cctvKey] : null;

                    if (popInfo && cctvInfo) {
                        const ratio = (cctvInfo.total / totalCCTVOverall) * 100;
                        const popPerCctv = popInfo.total / cctvInfo.total;

                        combined.push({
                            district: cleanName,
                            population: popInfo.total,
                            korean: popInfo.korean,
                            foreign: popInfo.foreign,
                            cctvCount: cctvInfo.total,
                            cctvRatio: ratio,
                            popPerCctv: popPerCctv,
                            history: cctvInfo.history
                        });
                    }
                });

                return {
                    list: combined,
                    totalCCTV: totalCCTVOverall,
                    totalPop: totalPopOverall,
                    avgPopPerCctv: totalPopOverall / totalCCTVOverall
                };
            }, [popData, cctvData]);

            // 자치구 랭킹 리스트 구하기
            const sortedByRatio = [...analysisData.list].sort((a, b) => b.cctvRatio - a.cctvRatio);
            const sortedByPopPerCctv = [...analysisData.list].sort((a, b) => a.popPerCctv - b.popPerCctv);

            const selectedInfo = useMemo(() => {
                return analysisData.list.find(d => d.district === selectedDistrict) || analysisData.list[0];
            }, [analysisData, selectedDistrict]);

            // 정렬된 표 데이터 만들기
            const processedTableData = useMemo(() => {
                let filtered = analysisData.list.filter(item => 
                    item.district.includes(searchTerm)
                );

                if (sortConfig !== null) {
                    filtered.sort((a, b) => {
                        if (a[sortConfig.key] < b[sortConfig.key]) {
                            return sortConfig.direction === 'ascending' ? -1 : 1;
                        }
                        if (a[sortConfig.key] > b[sortConfig.key]) {
                            return sortConfig.direction === 'ascending' ? 1 : -1;
                        }
                        return 0;
                    });
                }
                return filtered;
            }, [analysisData, searchTerm, sortConfig]);

            const requestSort = (key) => {
                let direction = 'ascending';
                if (sortConfig.key === key && sortConfig.direction === 'ascending') {
                    direction = 'descending';
                }
                setSortConfig({ key, direction });
            };

            // CSV 데이터 추출 및 다운로드 함수
            const exportToCSV = () => {
                const headers = ["순위", "자치구", "인구수", "내국인", "외국인", "CCTV설치대수", "전체설치비율(%)", "CCTV1대당인구수(명)"];
                const rows = sortedByRatio.map((item, idx) => [
                    idx + 1,
                    item.district,
                    item.population,
                    item.korean,
                    item.foreign,
                    item.cctvCount,
                    item.cctvRatio.toFixed(2),
                    item.popPerCctv.toFixed(1)
                ]);

                let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // 한글 깨짐 방지 BOM 추가
                csvContent += headers.join(",") + "\n";
                rows.forEach(row => {
                    csvContent += row.join(",") + "\n";
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "서울시_자치구별_CCTV_분석_결과.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
                    {/* 상단 타이틀 바 */}
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <div>
                            <div class="flex items-center gap-2 text-indigo-600 font-bold text-sm uppercase tracking-wider mb-1">
                                <span class="flex h-2 w-2 rounded-full bg-indigo-600 animate-pulse"></span>
                                서울시 스마트 시티 현황 분석
                            </div>
                            <h1 class="text-2xl md:text-3xl font-black text-slate-900 tracking-tight">CCTV 자치구별 설치 분석 대시보드</h1>
                            <p class="text-slate-500 mt-1 text-sm">인구수 대비 CCTV 적정 인프라 매핑 및 설치 비율 종합 리포트</p>
                        </div>
                        {/* CSV 파일 로더 */}
                        <div class="flex flex-wrap gap-2 w-full md:w-auto">
                            <label class="flex-1 md:flex-initial flex items-center justify-center gap-2 px-4 py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold text-xs rounded-xl cursor-pointer transition">
                                <i data-lucide="upload-cloud" class="w-4 h-4"></i>
                                인구 CSV 올리기
                                <input type="file" accept=".csv" onChange={(e) => handleFileUpload(e, "pop")} class="hidden" />
                            </label>
                            <label class="flex-1 md:flex-initial flex items-center justify-center gap-2 px-4 py-2.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-semibold text-xs rounded-xl cursor-pointer transition">
                                <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>
                                CCTV CSV 올리기
                                <input type="file" accept=".csv" onChange={(e) => handleFileUpload(e, "cctv")} class="hidden" />
                            </label>
                        </div>
                    </div>

                    {/* 파일 처리 알림 메시지 */}
                    {uploadMessage.text && (
                        <div class={`flex items-start gap-3 p-4 rounded-xl border ${
                            uploadMessage.type === 'success' ? 'bg-emerald-50 text-emerald-800 border-emerald-100' :
                            uploadMessage.type === 'error' ? 'bg-rose-50 text-rose-800 border-rose-100' :
                            'bg-blue-50 text-blue-800 border-blue-100'
                        } text-xs md:text-sm font-medium transition`}>
                            <i data-lucide={uploadMessage.type === 'success' ? 'check-circle' : uploadMessage.type === 'error' ? 'alert-triangle' : 'info'} class="w-5 h-5 flex-shrink-0"></i>
                            <div class="flex-1">
                                <p>{uploadMessage.text}</p>

                                            CCTV 수량 (대) <i data-lucide="arrow-up-down" class="w-3.5 h-3.5 inline-block ml-1 text-slate-400"></i>
                                        </th>
                                        <th class="p-4 cursor-pointer hover:bg-slate-100 select-none text-right" onClick={() => requestSort('cctvRatio')}>
                                            설치 비율 (%) <i data-lucide="arrow-up-down" class="w-3.5 h-3.5 inline-block ml-1 text-slate-400"></i>
                                        </th>
                                        <th class="p-4 cursor-pointer hover:bg-slate-100 select-none text-right" onClick={() => requestSort('popPerCctv')}>
                                            CCTV 1대당 인구수 (명/대) <i data-lucide="arrow-up-down" class="w-3.5 h-3.5 inline-block ml-1 text-slate-400"></i>
                                        </th>
                                        <th class="p-4">내/외국인 비중</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 text-sm">
                                    {processedTableData.length > 0 ? (
                                        processedTableData.map((row, index) => {
                                            const originalRank = sortedByRatio.findIndex(d => d.district === row.district) + 1;
                                            const isSelected = row.district === selectedDistrict;
                                            return (
                                                <tr 
                                                    key={row.district}
                                                    onClick={() => setSelectedDistrict(row.district)}
                                                    class={`cursor-pointer transition-colors ${
                                                        isSelected 
                                                            ? "bg-indigo-50/50 hover:bg-indigo-50" 
                                                            : "hover:bg-slate-50"
                                                    }`}
                                                >
                                                    <td class="p-4 font-bold text-slate-500">{originalRank}위</td>
                                                    <td class="p-4 font-black text-slate-900">{row.district}</td>
                                                    <td class="p-4 text-right font-semibold text-slate-700">{row.population.toLocaleString()}</td>
                                                    <td class="p-4 text-right font-black text-indigo-600">{row.cctvCount.toLocaleString()}</td>
                                                    <td class="p-4 text-right font-bold text-slate-800">{row.cctvRatio.toFixed(2)}%</td>
                                                    <td class="p-4 text-right font-bold text-emerald-600">{row.popPerCctv.toFixed(1)}</td>
                                                    <td class="p-4">
                                                        <div class="flex items-center gap-1.5 w-32">
                                                            <div class="h-2 rounded-full bg-slate-100 flex-1 overflow-hidden flex">
                                                                <div 
                                                                    style={{ width: `${(row.korean / row.population) * 100}%` }}
                                                                    class="bg-indigo-500 h-full"
                                                                ></div>
                                                                <div 
                                                                    style={{ width: `${(row.foreign / row.population) * 100}%` }}
                                                                    class="bg-amber-500 h-full"
                                                                ></div>
                                                            </div>
                                                            <span class="text-[10px] text-slate-400 font-bold block">
                                                                {((row.foreign / row.population) * 100).toFixed(1)}% 외
                                                            </span>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })
                                    ) : (
                                        <tr>
                                            <td colspan="7" class="p-8 text-center text-slate-400 italic">
                                                검색 조건에 맞는 자치구가 존재하지 않습니다.
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* 푸터 */}
                    <div class="text-center pb-8 text-xs text-slate-400 font-medium">
                        © 2026 서울특별시 자치구 인프라 매핑 대시보드. Built using React & SVG Core Charts.
                    </div>
                </div>
            );
        }

        // 렌더링 시작 및 아이콘 초기화 루틴
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

        // 아이콘 리로더 관찰자
        setInterval(() => {
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }, 1000);
    </script>
</body>
</html>
